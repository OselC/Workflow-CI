name: MLflow Auto-Training CI

on:
  push:
    branches:
      - main  # Trigger jalan saat push ke branch main

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow dagshub xgboost pandas scikit-learn matplotlib seaborn

      - name: Re-train Model
        run: |
          cd MLProject
          python modelling.py