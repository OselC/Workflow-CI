name: MLflow Auto-Training CI

on:
  push:
    branches:
      - main

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow dagshub xgboost pandas scikit-learn matplotlib seaborn

      - name: Run MLflow Training
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Execute training dan get the newest model run_id
          cd MLProject
          python modelling.py
          # Save run_id to file for the next step
          echo "RUN_ID=$(python -c 'import mlflow; print(mlflow.search_runs(experiment_names=["XGBoost_Liver_Disease_Tracking"])["run_id"][0])')" >> $GITHUB_ENV

      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: training-plots
          path: |
            *.png
            *.json

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image using MLflow
        run: |
          # -m: model location
          # -n: image name
          mlflow models build-docker \
            -m "runs:/${{ env.RUN_ID }}/model" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/liver-disease-model:latest" \
            --install-mlflow

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/liver-disease-model:latest